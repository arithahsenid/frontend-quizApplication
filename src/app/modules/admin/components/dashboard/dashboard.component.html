<div class="quiz-container" style="display: flex; flex-wrap: wrap; gap: 20px; padding: 20px;">
    <nz-card
      *ngFor="let test of tests"
      [nzBordered]="false"
      style="width: 300px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s;"
      class="quiz-card"
      [nzTitle]="test.title"
    >
      <p><strong>🕒 Time:</strong> {{ getFormattedTime(test.time) }}</p>
      <p><strong>📝 Description:</strong> {{ test.description }}</p>
  
      <div style="display: flex; justify-content: space-between; margin-top: 10px;">
        <button nz-button nzType="primary">View Test</button>
        <button nz-button nzType="default" style="margin-right: 5px; "
        routerLink="/admin/add-question/{{test.id}}">Add Question</button>
      </div>
    </nz-card>
  </div>
